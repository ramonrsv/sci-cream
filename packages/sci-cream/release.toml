pre-release-replacements = [
    { file = "README.md", search = "sci-cream = .*", replace = "{{crate_name}} = \"{{version}}\"" },
    { file = "src/lib.rs", search = "sci-cream = .*", replace = "{{crate_name}} = \"{{version}}\"" },
    { file = "package.json", search = "\"version\": \".*\"", replace = "\"version\": \"{{version}}\"" },
    { file = "CHANGELOG.md", search = "Unreleased", replace = "{{version}}" },
    { file = "CHANGELOG.md", search = "\\.\\.\\.HEAD", replace = "...{{tag_name}}", exactly = 1 },
    { file = "CHANGELOG.md", search = "ReleaseDate", replace = "{{date}}" },
    { file = "CHANGELOG.md", search = "<!-- next-header -->", replace = "<!-- next-header -->\n\n## [Unreleased] - ReleaseDate", exactly = 1 },
    { file = "CHANGELOG.md", search = "<!-- next-url -->\n\n", replace = "<!-- next-url -->\n\n[Unreleased]: https://github.com/ramonrsv/sci-cream/compare/{{tag_name}}...HEAD\n", exactly = 1 },
]
